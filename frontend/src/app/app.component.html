<div class="shell">
  <header class="topbar">
    <a routerLink="/" class="brand" aria-label="CHRVA Juniors migration overview">
      <img src="assets/logo.png" alt="" />
      <span>
        <strong>CHRVA Juniors</strong>
        <small>ColdFusion migration workspace</small>
      </span>
    </a>

    <nav aria-label="Primary">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        {{ item.label }}
      </a>
    </nav>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
