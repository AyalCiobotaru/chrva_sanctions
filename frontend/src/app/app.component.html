<div class="shell">
  <header class="topbar">
    <a routerLink="/" class="brand" aria-label="CHRVA Juniors migration overview">
      <img src="assets/logo.png" alt="" />
      <span>
        <strong>CHRVA Juniors</strong>
        <small>Modern application workspace</small>
      </span>
    </a>

    @if (session$ | async; as session) {
      <div class="topbar-actions">
        <nav aria-label="Primary">
          @for (item of navItems; track item) {
            @if (canShowNavItem(item, session)) {
              <a
                [routerLink]="item.path"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: item.path === '/' }"
                >
                {{ item.label }}
              </a>
            }
          }
        </nav>

        @if (session.authenticated && session.user) {
          <div class="session">
            <span>{{ session.user.displayName }}</span>
            <button type="button" (click)="logout()">Sign out</button>
          </div>
        } @else {
          <a routerLink="/login" class="login-link" routerLinkActive="active">Sign in</a>
        }
      </div>
    }
  </header>

  <app-error-banner />

  <main>
    <router-outlet />
  </main>
</div>
