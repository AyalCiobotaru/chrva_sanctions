<form [formGroup]="form" class="club-form" (ngSubmit)="submit()">
  <h2>{{ isEditing ? 'Edit Club' : 'Add New Club' }}</h2>
  @if (error) {
    <p class="error">{{ error }}</p>
  }
  @if (validationError) {
    <p class="error">{{ validationError }}</p>
  }

  <label>
    Club Code *
    <input formControlName="clubCode" maxlength="5" [readonly]="isEditing" />
  </label>
  <label>
    Club Name *
    <input formControlName="clubName" maxlength="50" />
  </label>
  <label>
    Contact First Name *
    <input formControlName="contactFirstName" maxlength="25" />
  </label>
  <label>
    Contact Last Name *
    <input formControlName="contactLastName" maxlength="50" />
  </label>
  <label>
    Address Line 1
    <input formControlName="address1" maxlength="50" />
  </label>
  <label>
    Address Line 2
    <input formControlName="address2" maxlength="50" />
  </label>
  <label>
    City *
    <input formControlName="city" maxlength="30" />
  </label>
  <label>
    State *
    <input formControlName="state" maxlength="2" />
  </label>
  <label>
    Zip *
    <input formControlName="zip" maxlength="10" />
  </label>
  <label>
    Phone 1 *
    <input formControlName="phone1" maxlength="15" />
  </label>
  <label>
    Phone 2
    <input formControlName="phone2" maxlength="15" />
  </label>
  <label>
    Email *
    <input formControlName="email" maxlength="50" />
  </label>
  <label>
    Alternate Email
    <input formControlName="alternateEmail" maxlength="50" />
  </label>
  <label>
    Username
    <input formControlName="username" maxlength="50" autocomplete="off" />
  </label>
  <label>
    Password
    <span class="password-control">
      <input
        formControlName="password"
        maxlength="15"
        autocomplete="new-password"
        [type]="showPassword ? 'text' : 'password'"
      />
      <button
        type="button"
        class="icon-button"
        [attr.aria-label]="showPassword ? 'Hide club password' : 'Show club password'"
        [title]="showPassword ? 'Hide password' : 'Show password'"
        (click)="togglePasswordVisibility()"
      >
        @if (showPassword) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.7 10.7a2 2 0 0 0 2.6 2.6" />
            <path d="M7.4 7.6C5.6 8.6 4.1 10.1 3 12c2.1 3.6 5.1 5.5 9 5.5 1.6 0 3-.3 4.2-1" />
            <path d="M10 5.7c.6-.1 1.3-.2 2-.2 3.9 0 6.9 1.8 9 5.5-.5.9-1.1 1.7-1.8 2.4" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12c2.1-3.6 5.1-5.5 9-5.5s6.9 1.8 9 5.5c-2.1 3.6-5.1 5.5-9 5.5S5.1 15.6 3 12z" />
            <circle cx="12" cy="12" r="2.5" />
          </svg>
        }
      </button>
    </span>
  </label>
  <label>
    Website
    <input formControlName="website" maxlength="100" />
  </label>
  <app-multi-select-dropdown
    formControlName="clubTypes"
    label="Club Type"
    [options]="clubTypeOptions"
  ></app-multi-select-dropdown>
  <label class="checkbox">
    <input type="checkbox" formControlName="active" />
    Active
  </label>
  <label class="wide">
    Comments
    <textarea formControlName="comments" rows="3"></textarea>
  </label>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid">{{ isEditing ? 'Save Changes' : 'Save' }}</button>
    <button type="button" class="secondary" (click)="cancel()">Cancel</button>
  </div>
</form>
