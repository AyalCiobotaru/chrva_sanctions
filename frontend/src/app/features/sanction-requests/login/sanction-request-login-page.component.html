<section class="login-layout">
  <form class="login-panel" [formGroup]="form" (ngSubmit)="login()">
    <div>
      <p class="eyebrow">Club Access</p>
      <h1>Tournament sanction request login</h1>
    </div>

    <label class="check">
      <input type="checkbox" formControlName="agree" />
      <span>I have read and agree to follow all junior tournament hosting and results reporting requirements.</span>
    </label>

    <label class="check">
      <input type="checkbox" formControlName="agreePenalties" />
      <span>I understand the penalties for failing to fulfill hosting requirements.</span>
    </label>

    <label>
      <span>Username</span>
      <input type="text" formControlName="username" autocomplete="username" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (error) {
      <p class="error" role="alert">{{ error }}</p>
    }

    <button type="submit" [disabled]="submitting">
      {{ submitting ? 'Signing in...' : 'Login' }}
    </button>
  </form>
</section>
