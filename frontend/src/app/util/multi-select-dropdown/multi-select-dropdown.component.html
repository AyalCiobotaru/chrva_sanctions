<div class="multi-select">
  @if (label) {
    <span class="field-label">{{ label }}</span>
  }

  <button
    type="button"
    class="trigger"
    [class.placeholder]="selectedValues.length === 0"
    [disabled]="disabled"
    [attr.aria-expanded]="open"
    (click)="toggleOpen()"
  >
    <span>{{ selectedText }}</span>
    <span class="chevron">▾</span>
  </button>

  @if (open) {
    <div class="menu" role="listbox" aria-multiselectable="true">
      @for (option of options; track option.value) {
        <button type="button" class="option" role="option" [attr.aria-selected]="isSelected(option.value)" (click)="toggleOption(option.value)">
          <span class="checkmark">{{ isSelected(option.value) ? '✓' : '' }}</span>
          <span>{{ option.label }}</span>
        </button>
      }
    </div>
  }
</div>
